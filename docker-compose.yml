# Local Postgres + Redis. Credentials from .env.compose (never commit .env.compose).
#   cp .env.compose.example .env.compose
#   docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env.compose
    ports:
      - "5433:5432"
    volumes:
      - gradeops_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  gradeops_pgdata:
